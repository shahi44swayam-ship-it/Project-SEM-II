<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">amazon<span>.in</span></div>

        <div class="search-box">
            <input type="text" placeholder="Search products...">
            <button>Search</button>
        </div>

        <div class="cart-icon">
            🛒 Cart: <span id="cart-count">0</span>
        </div>
    </header>

    <section class="hero">
        <h1>Welcome to Amazon Clone</h1>
        <p>Best Deals For You</p>
    </section>

    <section class="products">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1517336714739-489689fd1ca8?w=400" alt="">
            <h3>Laptop</h3>
            <p>₹55,999</p>
            <button class="add-btn" data-name="Laptop" data-price="55999">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="">
            <h3>Shoes</h3>
            <p>₹2,999</p>
            <button class="add-btn" data-name="Shoes" data-price="2999">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" alt="">
            <h3>Smart Watch</h3>
            <p>₹4,499</p>
            <button class="add-btn" data-name="Smart Watch" data-price="4499">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" alt="">
            <h3>Headphones</h3>
            <p>₹1,999</p>
            <button class="add-btn" data-name="Headphones" data-price="1999">
                Add to Cart
            </button>
        </div>

    </section>

    <section class="cart-section">
        <h2>Shopping Cart</h2>

        <div id="cart-items"></div>

        <h3>Total: ₹<span id="total-price">0</span></h3>
    </section>

    <script src="script.js"></script>
</body>
</html>
